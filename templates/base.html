<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand font-weight-bold" href="{% url 'task_list' %}">📝 Task Manager</a>
        <div class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
            <span class="navbar-text me-3 text-white">Вы вошли как: <strong>{{ user.username }}</strong></span>
            <form action="{% url 'logout' %}" method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
            {% else %}
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'login' %}">Войти</a>
            <a class="btn btn-primary btn-sm" href="{% url 'signup' %}">Регистрация</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
