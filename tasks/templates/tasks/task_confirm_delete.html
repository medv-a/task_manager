{% extends 'base.html' %}

{% block title %}Удаление задачи{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow">
            <div class="card-body text-center">
                <h3 class="card-title text-danger mb-4">Удаление задачи</h3>
                <p>Вы уверены, что хотите безвозвратно удалить задачу "<strong>{{ object.title }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2 shadow-sm">Да, удалить</button>
                    <a href="{% url 'task_list' %}" class="btn btn-secondary shadow-sm">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
